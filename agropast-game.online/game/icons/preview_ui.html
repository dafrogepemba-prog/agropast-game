<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Icônes UI — Ma Ferme</title>
<style>
  body{background:#0a1a0c;font-family:system-ui,sans-serif;color:#eaf4ea;padding:32px;}
  h1{font-size:18px;margin-bottom:24px;}
  .grid{display:flex;flex-wrap:wrap;gap:16px;}
  .tile{
    width:110px;background:#12241a;border:1px solid #2e4a34;border-radius:14px;
    padding:14px 10px;text-align:center;
  }
  .tile img{width:44px;height:44px;}
  .tile p{margin:8px 0 0;font-size:11px;color:#9db89f;}
</style>
</head>
<body>
  <h1>🌿 Ma Ferme — icônes UI (menu, stats, boutons)</h1>
  <div class="grid">
    <div class="tile"><img src="menu.svg"><p>menu.svg</p></div>
    <div class="tile"><img src="back.svg"><p>back.svg</p></div>
    <div class="tile"><img src="close.svg"><p>close.svg</p></div>
    <div class="tile"><img src="star.svg"><p>star.svg</p></div>
    <div class="tile"><img src="tractor.svg"><p>tractor.svg</p></div>
    <div class="tile"><img src="coin.svg"><p>coin.svg</p></div>
    <div class="tile"><img src="person.svg"><p>person.svg</p></div>
    <div class="tile"><img src="lock.svg"><p>lock.svg</p></div>
    <div class="tile"><img src="check_badge.svg"><p>check_badge.svg</p></div>
    <div class="tile"><img src="play.svg"><p>play.svg</p></div>
    <div class="tile"><img src="gear.svg"><p>gear.svg</p></div>
    <div class="tile"><img src="seedling.svg"><p>seedling.svg</p></div>
  </div>
</body>
</html>
