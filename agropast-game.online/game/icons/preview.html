<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Icônes — Ma Ferme</title>
<style>
  body{background:#0a0a0a;font-family:system-ui,sans-serif;color:#eaf4ea;padding:32px;}
  h1{font-size:18px;margin-bottom:24px;}
  .grid{display:flex;flex-wrap:wrap;gap:20px;}
  .tile{
    width:140px;background:#12241a;border:1px solid #2e4a34;border-radius:16px;
    padding:16px;text-align:center;
  }
  .tile img{width:80px;height:80px;}
  .tile p{margin:10px 0 0;font-size:12px;color:#9db89f;}
</style>
</head>
<body>
  <h1>🌿 Ma Ferme — set d'icônes pour Kiro</h1>
  <div class="grid">
    <div class="tile"><img src="app_icon.svg"><p>app_icon.svg</p></div>
    <div class="tile"><img src="tomato.svg"><p>tomato.svg</p></div>
    <div class="tile"><img src="mais.svg"><p>mais.svg</p></div>
    <div class="tile"><img src="carotte.svg"><p>carotte.svg</p></div>
    <div class="tile"><img src="piment.svg"><p>piment.svg</p></div>
    <div class="tile"><img src="arrosoir.svg"><p>arrosoir.svg</p></div>
  </div>
</body>
</html>
