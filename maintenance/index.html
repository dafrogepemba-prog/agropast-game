<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site en maintenance — Epsylon CG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 3rem 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 1rem;
      color: #f9a825;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: rgba(255,255,255,.75);
      margin-bottom: 1.5rem;
    }
    .progress-wrap {
      background: rgba(255,255,255,.1);
      border-radius: 50px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .progress-bar {
      height: 100%;
      width: 70%;
      background: linear-gradient(90deg, #f9a825, #4caf50);
      border-radius: 50px;
      animation: load 2s ease-in-out infinite alternate;
    }
    @keyframes load {
      from { width: 40%; }
      to   { width: 85%; }
    }
    .contact {
      font-size: .9rem;
      color: rgba(255,255,255,.5);
    }
    .contact a {
      color: #4caf50;
      text-decoration: none;
    }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">🔧</div>
    <h1>Site en maintenance</h1>
    <p>
      Nous effectuons des améliorations pour vous offrir une meilleure expérience.
      Le site sera de retour très prochainement.
    </p>
    <div class="progress-wrap" role="progressbar" aria-label="Progression de la maintenance">
      <div class="progress-bar"></div>
    </div>
    <p class="contact">
      Une question urgente ?<br>
      Contactez-nous : <a href="mailto:contact@epsylon-cg.com">contact@epsylon-cg.com</a>
    </p>
  </div>
</body>
</html>
