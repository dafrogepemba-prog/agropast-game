name: Deploy + Build APK

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1 : FTP ──────────────────────────────────────────
  deploy:
    name: Deploy to LWS via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            .github/**
            agropast_game/build/**
            agropast_game/.dart_tool/**
            agropast_game/.flutter-plugins**

  # ── Job 2 : APK ──────────────────────────────────────────
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('agropast_game/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get
        working-directory: agropast_game

      - name: Flutter build APK
        run: flutter build apk --release
        working-directory: agropast_game

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agropast-game-apk
          path: agropast_game/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
