name: Deploy to LWS via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            deploy-ftp.bat
            ftp-commands.txt
            maintenance/**
            .github/**
