name: Deploy to LWS via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            deploy-ftp.bat
            ftp-commands.txt
            ftp-deploy-game.txt
            maintenance/**
            .github/**
            agropast_game/build/**
            agropast_game/.dart_tool/**
            agropast_game/.flutter-plugins**

  build-and-deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-source
    defaults:
      run:
        working-directory: agropast_game
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web bundle
        run: flutter clean && flutter build web --release --base-href /game/

      - name: Verify base href
        run: grep -n "base href" build/web/index.html

      - name: Deploy web bundle via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: agropast_game/build/web/
          server-dir: /agropast-game.online/agropast-game.online/game/