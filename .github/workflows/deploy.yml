name: Deploy + Build APK

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1 : Déploiement FTP ────────────────────────────────
  deploy:
    name: Deploy to LWS via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            deploy-ftp.bat
            ftp-commands.txt
            ftp-deploy-game.txt
            maintenance/**
            .github/**
            agropast_game/build/**
            agropast_game/.dart_tool/**
            agropast_game/.flutter-plugins**

  # ── Job 2 : Build APK Android ─────────────────────────────
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: agropast_game

      - name: Build APK release
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: agropast_game

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agropast-game-release
          path: agropast_game/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/
          local-dir: agropast_game/build/app/outputs/flutter-apk/
          include: |
            app-release.apk
