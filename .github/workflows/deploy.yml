name: Deploy + Build Web + AAB

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1 : Build web + déploiement FTP ──────────────────
  deploy-web:
    name: Build web and deploy to LWS via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: agropast_game

      - name: Build web release
        run: flutter build web --release
        working-directory: agropast_game

      - name: Deploy web build to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/game/
          local-dir: agropast_game/build/web/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/assets/**
            **/*.map

      - name: Prepare API server config (inject secrets)
        if: ${{ secrets.APP_SECRET_KEY != '' }}
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        run: |
          echo "Preparing API server config files (not committed)"
          # Create a .htaccess to export APP_SECRET_KEY to Apache/PHP
          cat > api/.htaccess <<HTA
          <IfModule mod_env.c>
            SetEnv APP_SECRET_KEY "${APP_SECRET_KEY}"
          </IfModule>
          HTA
            # Fallback: write a PHP file that sets the env var for PHP (putenv + _ENV)
            cat > api/server_config.php <<PHP
            <?php
            // Ensure getenv('APP_SECRET_KEY') returns the secret when .htaccess isn't available
            if (getenv('APP_SECRET_KEY') === false && !empty('${APP_SECRET_KEY}')) {
              putenv('APP_SECRET_KEY=${APP_SECRET_KEY}');
              $_ENV['APP_SECRET_KEY'] = '${APP_SECRET_KEY}';
            }
            PHP

      - name: Deploy API to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.epsylon-cg.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /agropast-game.online/api/
          local-dir: api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log

  # ── Job 2 : Build AAB Android (production) ───────────────
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('agropast_game/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # Recréer key.properties depuis les secrets GitHub (optionnel)
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Keystore secret found, setting up production signing..."
            echo "$KEYSTORE_BASE64" | base64 -d > agropast_game/android/agropast_release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=agropast\nstoreFile=agropast_release.jks\n' \
              "$STORE_PASSWORD" "$KEY_PASSWORD" \
              > agropast_game/android/key.properties
            echo "key.properties created successfully"
          else
            echo "No keystore secret found — creating debug keystore for CI fallback signing"
            mkdir -p "$HOME/.android"
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AgroPast CI,O=AgroPast,C=CG"
            echo "Debug keystore created at $HOME/.android/debug.keystore"
          fi

      - name: Flutter pub get
        run: flutter pub get
        working-directory: agropast_game

      # Build AAB (obligatoire pour Google Play)
      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release
        working-directory: agropast_game

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: agropast-game-release-aab
          path: agropast_game/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Build APK aussi pour les tests directs
      - name: Build APK (tests)
        run: flutter build apk --release
        working-directory: agropast_game

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agropast-game-release-apk
          path: agropast_game/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
