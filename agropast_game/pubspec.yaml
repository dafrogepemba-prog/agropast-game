name: agropast_game
description: "AgroPast-Game — Jeu mobile de ferme de pastèques et vinification"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Pub/Sub état global
  provider: ^6.1.2
  # Persistance locale (scores, progression)
  shared_preferences: ^2.3.2
  # AdMob Rewarded Ads (Android/iOS)
  google_mobile_ads: ^5.1.0
  # Audio — Parcours Quotidien (P1)
  audioplayers: ^6.1.0
  # SVG pour icônes cultures
  flutter_svg: ^2.0.10
  # Animations
  animate_do: ^3.3.4
  # HTTP pour leaderboard API
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
