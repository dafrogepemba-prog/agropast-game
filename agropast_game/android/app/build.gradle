import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Charger key.properties si présent (local + CI)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.agropast.agropast_game"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.agropast.agropast_game"
        minSdk = 21
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias     = keystoreProperties['keyAlias']     ?: System.getenv('KEY_ALIAS')
            keyPassword  = keystoreProperties['keyPassword']  ?: System.getenv('KEY_PASSWORD')
            storeFile    = keystoreProperties['storeFile']
                ? file(keystoreProperties['storeFile'])
                : (System.getenv('KEYSTORE_PATH') ? file(System.getenv('KEYSTORE_PATH')) : null)
            storePassword = keystoreProperties['storePassword'] ?: System.getenv('STORE_PASSWORD')
        }
    }

    buildTypes {
        release {
            signingConfig    = signingConfigs.release
            minifyEnabled    = false   // Vague 2 : sera activé après tests R8
            shrinkResources  = false
        }
    }
}

flutter {
    source = "../.."
}
